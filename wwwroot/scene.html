<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Viewer</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.min.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="info">
        <h2 id="hunterName">Loading...</h2>
        <p id="status">Initializing 3D viewer...</p>
    </div>
    <div id="error">
        <h2>Model not found</h2>
        <p id="errorMessage"></p>
    </div>
    <div id="devPanel">
        <h3>DEV CONTROLS</h3>

        <div class="dropdown-group">
            <label>Hunter</label>
            <select id="hunterSelect">
                <option value="">None</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label>Survivor 1</label>
            <select id="survivor1Select">
                <option value="">None</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label>Survivor 2</label>
            <select id="survivor2Select">
                <option value="">None</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label>Survivor 3</label>
            <select id="survivor3Select">
                <option value="">None</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label>Survivor 4</label>
            <select id="survivor4Select">
                <option value="">None</option>
            </select>
        </div>

        <button onclick="applyDevSelection()">Apply Changes</button>

        <hr>
        <h4>RENDERING</h4>

        <div class="dropdown-group">
            <label>Tone Mapping</label>
            <select id="toneMappingSelect" onchange="applyRenderingSettings()">
                <option value="NoToneMapping">No Tone Mapping</option>
                <option value="Linear">Linear</option>
                <option value="Reinhard">Reinhard</option>
                <option value="Cineon">Cineon</option>
                <option value="ACESFilmic" selected>ACES Filmic</option>
            </select>
        </div>

        <div class="slider-group">
            <label>Tone Mapping Exposure: <span id="exposureValue">1.0</span></label>
            <input type="range" id="exposureSlider" min="0.1" max="3.0" step="0.1" value="1.0" oninput="applyRenderingSettings()">
        </div>

        <div class="dropdown-group">
            <label>Shadow Map Type</label>
            <select id="shadowMapTypeSelect" onchange="applyRenderingSettings()">
                <option value="Basic">Basic</option>
                <option value="PCF" selected>PCF</option>
                <option value="PCFSoft">PCF Soft</option>
                <option value="VSM">VSM</option>
            </select>
        </div>

        <hr>
        <h4>LIGHTING</h4>

        <div class="slider-group">
            <label>Hemisphere: <span id="hemisphereValue">0.02</span></label>
            <input type="range" id="hemisphereSlider" min="0" max="2.0" step="0.01" value="0.02" oninput="applyLightingSettings()">
        </div>

        <div class="slider-group">
            <label>Key Light: <span id="keyLightValue">0.8</span></label>
            <input type="range" id="keyLightSlider" min="0" max="3.0" step="0.1" value="0.8" oninput="applyLightingSettings()">
        </div>

        <div class="slider-group">
            <label>Fill Light: <span id="fillLightValue">0.02</span></label>
            <input type="range" id="fillLightSlider" min="0" max="2.0" step="0.01" value="0.02" oninput="applyLightingSettings()">
        </div>

        <div class="slider-group">
            <label>Rim Light: <span id="rimLightValue">0.02</span></label>
            <input type="range" id="rimLightSlider" min="0" max="2.0" step="0.01" value="0.02" oninput="applyLightingSettings()">
        </div>

        <div class="slider-group">
            <label>Sun Light: <span id="sunLightValue">0.8</span></label>
            <input type="range" id="sunLightSlider" min="0" max="3.0" step="0.1" value="0.8" oninput="applyLightingSettings()">
        </div>

        <div class="color-group">
            <label>Light Color</label>
            <input type="color" id="lightColorPicker" value="#ffffff" oninput="applyLightingSettings()">
        </div>

        <div class="color-group">
            <label>Sun Color</label>
            <input type="color" id="sunColorPicker" value="#ffffff" oninput="applyLightingSettings()">
        </div>

        <hr>
        <h4>SUN POSITION</h4>

        <div class="slider-group">
            <label>X: <span id="sunXValue">5</span></label>
            <input type="range" id="sunXSlider" min="-20" max="20" step="1" value="5" oninput="applySunPosition()">
        </div>

        <div class="slider-group">
            <label>Y: <span id="sunYValue">15</span></label>
            <input type="range" id="sunYSlider" min="0" max="30" step="1" value="15" oninput="applySunPosition()">
        </div>

        <div class="slider-group">
            <label>Z: <span id="sunZValue">10</span></label>
            <input type="range" id="sunZSlider" min="-20" max="20" step="1" value="10" oninput="applySunPosition()">
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
