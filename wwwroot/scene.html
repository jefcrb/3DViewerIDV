<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Viewer</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@theatre/core": "https://esm.sh/@theatre/core@0.7.2",
        "@theatre/studio": "https://esm.sh/@theatre/studio@0.7.2?deps=@theatre/core@0.7.2"
      }
    }
    </script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="info">
        <h2 id="hunterName">Loading...</h2>
        <p id="status">Initializing 3D viewer...</p>
    </div>
    <div id="error">
        <h2>Model not found</h2>
        <p id="errorMessage"></p>
    </div>

    <button id="modeToggleBtn" style="display:none;">Switch to Editor</button>
    <div id="editorPanel" style="display:none;"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
